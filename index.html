document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size:22px;font-weight:600;letter-spacing:.2px;line-height:1;\">VitaSwift<\u002Fdiv><div style=\"font-size:9.5px;letter-spacing:3px;color:#5fcfae;text-transform:uppercase;margin-top:4px;\">Pharmacy<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#3f7d6e;margin-bottom:12px;\">Account Setup<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:3px;\">\n        <sc-for list=\"{{ authSteps }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;gap:13px;padding:10px 11px;border-radius:12px;background:{{ st.rowBg }};\">\n            <div style=\"width:29px;height:29px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;background:{{ st.dotBg }};color:{{ st.dotColor }};border:1.5px solid {{ st.dotBorder }};\">{{ st.dotLabel }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:{{ st.labelColor }};font-weight:{{ st.labelWeight }};\">{{ st.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#3f7d6e;margin-bottom:12px;\">🔒 Checkout · Locked<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:1px;opacity:.5;\">\n        <sc-for list=\"{{ lockedSteps }}\" as=\"ls\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex;align-items:center;gap:13px;padding:8px 11px;\">\n            <div style=\"width:24px;height:24px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#3f7d6e;border:1.5px dashed #2c5a4f;\">{{ ls.num }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#5b8e80;\">{{ ls.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div sty  secure password\" style=\"width:100%;padding:14px 16px;font-size:15px;border:2px solid {{ bd.loginPassword }};border-radius:12px;outline:none;background:#fbfdfc;margin-bottom:26px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <button onclick=\"{{ toggleMode }}\" style=\"background:none;border:none;color:#0a7d61;font-size:13px;font-weight:600;cursor:pointer;padding:0;\">Create an account →<\u002Fbutton>\n            <button onclick=\"{{ submitLogin }}\" style=\"background:linear-gradient(135deg,#0E9A78,#0a7d61);color:#fff;border:none;padding:4px 10px;font-size:11px;font-weight:600;border-radius:7px;max-width:84px;cursor:pointer;box-shadow:0 6px 18px rgba(14,154,120,.4);\">{{ cta }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- REGISTER -->\n      <sc-if value=\"{{ isRegister }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px solid #e3eef0;border-radius:22px;padding:38px 36px;box-shadow:0 10px 40px rgba(13,43,38,.07);\">\n          <h1 style=\"font-family:Spectral,serif;font-size:30px;font-weight:600;margin:0 0 6px;letter-spacing:-.3px;\">Create your account<\u002Fh1>\n          <p style=\"font-size:14.5px;color:#5b8e80;margin:0 0 26px;\">All fields are required to protect your prescription history.<\u002Fp>\n\n          <div style=\"display:grid;grid-template-columns:110px 1fr 1fr;gap:14px;margin-bottom:14px;\">\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Prefix<\u002Flabel>\n              <select value=\"{{ prefix }}\" onchange=\"{{ on_prefix }}\" style=\"width:100%;padding:13px 12px;font-size:14px;border:2px solid {{ bd.prefix }};border-radius:11px;outline:none;background:#fbfdfc;\"><option value=\"\">—<\u002Foption><option>Mr<\u002Foption><option>Ms<\u002Foption><option>Mx<\u002Foption><option>Dr<\u002Foption><option>Prof<\u002Foption><\u002Fselect><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">First name<\u002Flabel>\n              <input value=\"{{ firstName }}\" onchange=\"{{ on_firstName }}\" style=\"width:100%;padding:13px 14px;font-size:14px;border:2px solid {{ bd.firstName }};border-radius:11px;outline:none;background:#fbfdfc;\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Middle name<\u002Flabel>\n              <input value=\"{{ middleName }}\" onchange=\"{{ on_middleName }}\" style=\"width:100%;padding:13px 14px;font-size:14px;border:2px solid {{ bd.middleName }};border-radius:11px;outline:none;background:#fbfdfc;\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;\">\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Last name<\u002Flabel>\n              <input value=\"{{ lastName }}\" onchange=\"{{ on_lastName }}\" style=\"width:100%;padding:13px 14px;font-size:14px;border:2px solid {{ bd.lastName }};border-radius:11px;outline:none;background:#fbfdfc;\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Gender<\u002Flabel>\n              <select value=\"{{ gender }}\" onchange=\"{{ on_gender }}\" style=\"width:100%;padding:13px 12px;font-size:14px;border:2px solid {{ bd.gender }};border-radius:11px;outline:none;background:#fbfdfc;\"><option value=\"\">Select…<\u002Foption><option>Female<\u002Foption><option>Male<\u002Foption><option>Non-binary<\u002Foption><option>Prefer not to say<\u002Foption><\u002Fselect><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;\">\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Date of birth<\u002Flabel>\n              <input type=\"date\" value=\"{{ dob }}\" onchange=\"{{ on_dob }}\" style=\"width:100%;padding:12px 14px;font-size:14px;border:2px solid {{ bd.dob }};border-radius:11px;outline:none;background:#fbfdfc;\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Preferred pharmacy<\u002Flabel>\n              <select value=\"{{ pharmacy }}\" onchange=\"{{ on_pharmacy }}\" style=\"width:100%;padding:13px 12px;font-size:14px;border:2px solid {{ bd.pharmacy }};border-radius:11px;outline:none;background:#fbfdfc;\"><option value=\"\">Select location…<\u002Foption><option>Downtown Central<\u002Foption><option>Riverside Plaza<\u002Foption><option>North Hills<\u002Foption><option>Airport Annex<\u002Foption><\u002Fselect><\u002Fdiv>\n          <\u002Fdiv>\n\n          <label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Email address<\u002Flabel>\n          <input type=\"email\" value=\"{{ regEmail }}\" onchange=\"{{ on_regEmail }}\" placeholder=\"you@example.com\" style=\"width:100%;padding:13px 14px;font-size:14px;border:2px solid {{ bd.regEmail }};border-radius:11px;outline:none;background:#fbfdfc;margin-bottom:14px;\">\n\n          <label style=\"display:block;font-size:11.5px;font-weight:600;color:#5b8e80;margin-bottom:6px;\">Password<\u002Flabel>\n          <input type=\"text\" value=\"{{ regPassword }}\" onchange=\"{{ on_regPassword }}\" placeholder=\"Create your secure password\" style=\"width:100%;padding:13px 14px;font-size:14px;border:2px solid {{ bd.regPassword }};border-radius:11px;outline:none;background:#fbfdfc;margin-bottom:14px;\">\n\n          <div style=\"background:linear-gradient(135deg,#f7fdfb,#eefaf4);border:1px solid #d6efe5;border-radius:14px;padding:18px 20px;margin-bottom:24px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#0a7d61;letter-spacing:.3px;margin-bottom:12px;\">🛡️ VitaSwift Advanced Security Standard<\u002Fdiv>\n            <div style=\"display:grid;gap:9px;\">\n              <div style=\"display:flex;gap:9px;font-size:12.5px;color:#5b8e80;\"><span style=\"color:#0E9A78;\">●<\u002Fspan>At least <strong style=\"color:#0d2b26;\">16 characters<\u002Fstrong><\u002Fdiv>\n              <div style=\"display:flex;gap:9px;font-size:12.5px;color:#5b8e80;\"><span style=\"color:#0E9A78;\">●<\u002Fspan>At least <strong style=\"color:#0d2b26;\">2 emojis<\u002Fstrong> 💊❤️<\u002Fdiv>\n              <div style=\"display:flex;gap:9px;font-size:12.5px;color:#5b8e80;\"><span style=\"color:#0E9A78;\">●<\u002Fspan>At least <strong style=\"color:#0d2b26;\">1 uppercase Roman numeral<\u002Fstrong> (I, V, X, L, C, D, M)<\u002Fdiv>\n              <div style=\"display:flex;gap:9px;font-size:12.5px;color:#5b8e80;\"><span style=\"color:#0E9A78;\">●<\u002Fspan>Strictly <strong style=\"color:#0d2b26;\">no consecutive repeating letters<\u002Fstrong><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <button onclick=\"{{ toggleMode }}\" style=\"background:none;border:none;color:#0a7d61;font-size:13px;font-weight:600;cursor:pointer;padding:0;\">← Back to sign in<\u002Fbutton>\n            <button onclick=\"{{ submitRegister }}\" style=\"background:linear-gradient(135deg,#0E9A78,#0a7d61);color:#fff;border:none;padding:4px 10px;font-size:11px;font-weight:600;border-radius:7px;max-width:84px;cursor:pointer;box-shadow:0 6px 18px rgba(14,154,120,.4);\">{{ cta }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- VERIFY -->\n      <sc-if value=\"{{ isVerify }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px solid #e3eef0;border-radius:22px;padding:42px 38px;box-shadow:0 10px 40px rgba(13,43,38,.07);text-align:center;\">\n          <div style=\"width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#eafaf4,#d6f3e8);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 22px;\">📨<\u002Fdiv>\n          <h1 style=\"font-family:Spectral,serif;font-size:28px;font-weight:600;margin:0 0 8px;letter-spacing:-.3px;\">Verify your identity<\u002Fh1>\n          <p style=\"font-size:14px;color:#5b8e80;margin:0 0 26px;\">Enter the 6-digit code we sent to your email.<\u002Fp>\n          <input value=\"{{ code }}\" onchange=\"{{ on_code }}\" placeholder=\"••••••\" maxlength=\"6\" style=\"width:220px;padding:16px;font-size:24px;text-align:center;letter-spacing:12px;border:2px solid {{ bd.code }};border-radius:14px;outline:none;background:#fbfdfc;margin:0 auto 26px;display:block;\">\n          <div style=\"display:flex;align-items:center;justify-content:center;\">\n            <button onclick=\"{{ submitVerify }}\" style=\"background:linear-gradient(135deg,#0E9A78,#0a7d61);color:#fff;border:none;padding:4px 10px;font-size:11px;font-weight:600;border-radius:7px;max-width:84px;cursor:pointer;box-shadow:0 6px 18px rgba(14,154,120,.4);\">{{ cta }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SUCCESS -->\n      <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px solid #e3eef0;border-radius:22px;padding:46px 38px;box-shadow:0 10px 40px rgba(13,43,38,.07);text-align:center;\">\n          <div style=\"width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#0E9A78,#0a7d61);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 22px;box-shadow:0 16px 40px rgba(14,154,120,.35);\">✓<\u002Fdiv>\n          <h1 style=\"font-family:Spectral,serif;font-size:30px;font-weight:600;margin:0 0 8px;letter-spacing:-.3px;\">You're signed in<\u002Fh1>\n          <p style=\"font-size:14.5px;color:#5b8e80;margin:0 0 28px;\">Welcome to VitaSwift. Only 7 checkout steps remain before you can buy your medicine.<\u002Fp>\n          <a href=\"checkout.html\" style=\"background:linear-gradient(135deg,#0E9A78,#0a7d61);color:#fff;text-decoration:none;padding:4px 10px;font-size:11px;font-weight:600;border-radius:7px;max-width:96px;display:inline-block;box-shadow:0 6px 18px rgba(14,154,120,.4);\">Begin checkout<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- DENSE EMOJI STORM (managed imperatively so it never re-renders the form) -->\n<div id=\"vs-emoji-layer\" style=\"position:fixed;inset:0;z-index:40;pointer-events:none;overflow:hidden;\"><\u002Fdiv>\n\n<!-- OVERSIZED FOMO TOASTS -->\n<div style=\"position:fixed;right:24px;top:24px;z-index:55;display:flex;flex-direction:column;gap:16px;max-width:600px;\">\n  <sc-for list=\"{{ toasts }}\" as=\"t\" hint-placeholder-count=\"0\">\n    <div style=\"background:#0d2b26;color:#eafaf4;padding:26px 30px;border-radius:20px;box-shadow:0 22px 60px rgba(0,0,0,.34);animation:toastIn .4s ease;display:flex;gap:18px;align-items:center;border:1px solid rgba(229,72,77,.35);\">\n      <span style=\"font-size:38px;line-height:1;\">⚠️<\u002Fspan>\n      <div><div style=\"font-size:11px;letter-spacing:2px;color:#ff8a8a;text-transform:uppercase;margin-bottom:6px;font-weight:700;\">Warning · Inventory<\u002Fdiv><div style=\"font-size:20px;line-height:1.35;font-weight:500;\">{{ t.msg }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n\n<!-- 5-SECOND TEXTLESS VOID -->\n<sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:90;background:rgba(247,250,249,.94);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;\">\n    <div style=\"width:56px;height:56px;border:4px solid #e3ece8;border-top-color:#0E9A78;border-radius:50%;animation:spin .9s linear infinite;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  // ===================================================================\n  //  VitaSwift — Onboarding (Login + Registration)\n  //  \"Worst Site Ever Challenge 2026\" — the auth phase, weaponized.\n  //  Each pattern is annotated against the case-study template:\n  //    Decision · Why it's bad · Heuristic/Law violated · Good version\n  // ===================================================================\n\n  state = {\n    screen: 'login',            // 'login' | 'register' | 'verify' | 'success'\n    loading: false,\n    registeredOnce: false,\n    verifiedOnce: false,\n    // login\n    loginEmail: '', loginPassword: '',\n    // register\n    prefix: '', firstName: '', middleName: '', lastName: '', gender: '', dob: '', pharmacy: '', regEmail: '', regPassword: '',\n    // verify\n    code: '',\n    errors: {},\n    toasts: [],\n    cta: 'Submit',\n  };\n\n  // ---- Dark pattern #3 — Inconsistent CTAs (Nielsen #4: Consistency & Standards) ----\n  // Decision: never label the submit button the same way twice across screens.\n  // Why it's bad: disrupts behavioral scanning; the user re-reads every button.\n  // Heuristic violated: Nielsen #4 (Consistency & Standards) + Jakob's Law.\n  // Good version: a single, stable, predictable verb (\"Continue\") everywhere.\n  CTAS = ['Acknowledge', 'Execute', 'Commit Step', 'Submit'];\n\n  LOCKED = ['Select', 'Cart', 'Details', 'Shipping', 'Payment', 'Billing', 'Confirm'];\n\n  componentDidMount() {\n    // ---- Dark pattern #4 — Aggressive-scale FOMO (Cialdini scarcity, abused) ----\n    // Decision: fire OVERSIZED scarcity warnings every 20s while the user is just trying to sign in.\n    // Why it's bad: manufactures panic at the auth stage, before any product is even chosen.\n    // Heuristic violated: Nielsen #1 (Visibility of true status) + trust erosion.\n    // Good version: never inject scarcity pressure into authentication.\n    this._fomo = setInterval(() => this.spawnFomo(), 20000);\n    setTimeout(() => this.spawnFomo(), 4000);\n\n    // ---- Sensory overload — continuous dense emoji storm over the form fields ----\n    // Decision: spew 2-3 large, fast emoji every ~200ms, rising across the inputs.\n    // Why it's bad: decorative motion competes with the very text the user must read & type.\n    // Heuristic violated: Aesthetic-Usability Effect (abused) + Nielsen #8 (minimalist design).\n    // Good version: no animation layered over interactive form content.\n    // Emoji storm runs ONLY during the first 380ms — one short, dense burst over the content, then stops.\n    this._float = setInterval(() => this.spawnFloater(), 60);\n    setTimeout(() => clearInterval(this._float), 380);\n\n    this.setState({ cta: this.pickCta() });\n  }\n  componentWillUnmount() { clearInterval(this._fomo); clearInterval(this._float); }\n\n  pickCta() { return this.CTAS[Math.floor(Math.random() * this.CTAS.length)]; }\n\n  spawnFomo() {\n    const id = Date.now() + Math.random();\n    const msg = 'Inventory low for Cold & Flu remedies in your zip code. Complete login immediately.';\n    this.setState(s => ({ toasts: [...s.toasts, { id, msg }] }));\n    setTimeout(() => this.setState(s => ({ toasts: s.toasts.filter(t => t.id !== id) })), 7000);\n  }\n\n  spawnFloater() {\n    // Imperative DOM injection — never calls setState, so the form is never re-rendered/remounted.\n    const layer = document.getElementById('vs-emoji-layer');\n    if (!layer) return;\n    const set = ['💊', '💉', '🩺', '❤️', '🏥', '🧬', '🩹', '⚕️', '🌡️', '🧪', '🩸', '😷', '🤒', '🔬'];\n    const burst = 2 + Math.floor(Math.random() * 2);\n    for (let i = 0; i < burst; i++) {\n      const sp = document.createElement('span');\n      sp.textContent = set[Math.floor(Math.random() * set.length)];\n      const dur = (1.6 + Math.random() * 1).toFixed(1);\n      sp.style.cssText = 'position:absolute;bottom:-50px;left:' + Math.floor(Math.random() * 97) + '%;font-size:' + Math.floor(26 + Math.random() * 28) + 'px;animation:floatUp ' + dur + 's linear forwards;';\n      layer.appendChild(sp);\n      setTimeout(() => sp.remove(), parseFloat(dur) * 1000 + 200);\n    }\n  }\n\n  toggleMode() {\n    this.setState(s => ({ screen: s.screen === 'login' ? 'register' : 'login', errors: {}, cta: this.pickCta() }));\n  }\n\n  onField(k) {\n    return (e) => {\n      const v = e.target.value;\n      this.setState(s => ({ [k]: v, errors: { ...s.errors, [k]: false } }));\n    };\n  }\n\n  // ---- Dark pattern #1 — Hostile password policy (literal & destructive) ----\n  // Decision: require 16+ chars, 2 emoji, 1 uppercase Roman numeral, NO consecutive repeating letters.\n  // Why it's bad: near-impossible rules, checked so literally that valid-looking input still fails.\n  // Heuristic violated: Nielsen #5 (Error Prevention) + #6 (Recognition not recall).\n  // Good version: a reasonable policy with real-time, inline guidance.\n  validPassword(p) {\n    if (!p || p.length < 16) return false;\n    const emojis = (p.match(/\\p{Extended_Pictographic}/gu) || []).length;\n    if (emojis < 2) return false;\n    if (!/[IVXLCDM]/.test(p)) return false;      // uppercase Roman numeral\n    if (/([A-Za-z])\\1/.test(p)) return false;     // no consecutive repeating letters\n    return true;\n  }\n\n  // ---- Dark pattern #1b — The Rejection Loop (Nielsen #9: error recovery) ----\n  // Decision: on ANY failure, flash borders red, give NO text, and ERASE the whole password field.\n  // Why it's bad: zero diagnosis + destroys the user's work, forcing a 16+ char re-type from scratch.\n  // Heuristic violated: Nielsen #9 (Help users recognize, diagnose, recover from errors).\n  // Good version: specific inline errors, and never clear what the user already typed.\n  submitRegister() {\n    const s = this.state;\n    const e = {};\n    ['prefix', 'firstName', 'middleName', 'lastName', 'gender', 'dob', 'pharmacy', 'regEmail'].forEach(k => {\n      if (!String(s[k]).trim()) e[k] = true;\n    });\n    if (s.regEmail && !s.regEmail.includes('@')) e.regEmail = true;\n    const pwOk = this.validPassword(s.regPassword);\n    if (!pwOk) e.regPassword = true;\n\n    if (Object.keys(e).length > 0) {\n      // Wipe the password on any failure — anywhere in the form.\n      this.setState({ errors: e, regPassword: '', cta: this.pickCta() });\n      return;\n    }\n\n    // ---- Dark pattern #2a — The textless 5-second void after a valid registration (Doherty) ----\n    // Decision: do NOT auto-login; freeze behind a bare spinner for 5s with no status.\n    // Why it's bad: ~12x past the 0.4s Doherty threshold at a high-stakes moment.\n    // Heuristic violated: Doherty Threshold + Nielsen #1 (Visibility of system status).\n    // Good version: optimistic UI, or a progress indicator with real status text.\n    this.setState({ loading: true, errors: {} });\n    setTimeout(() => this.setState({ loading: false, screen: 'verify', registeredOnce: true, cta: this.pickCta() }), 5000);\n  }\n\n  // ---- Dark pattern #2b — The Verification Maze (Nielsen #4 + #3) ----\n  // Decision: after verifying a 6-digit code, dump the user back to a BLANK login screen,\n  //   discarding the email & password they just set, forcing a full re-entry to get in.\n  // Why it's bad: pointless redundant work; breaks the expected \"verify → you're in\" model.\n  // Heuristic violated: Nielsen #4 (Consistency & Standards) + #3 (User control & freedom).\n  // Good version: verifying should log the user straight in — never reset their session.\n  submitVerify() {\n    if (!/^\\d{6}$/.test(this.state.code)) { this.setState({ errors: { code: true } }); return; }\n    this.setState({\n      screen: 'login', verifiedOnce: true,\n      loginEmail: '', loginPassword: '',   // wipe — force full re-typing\n      regPassword: '', code: '', errors: {}, cta: this.pickCta(),\n    });\n  }\n\n  submitLogin() {\n    const s = this.state;\n    const e = {};\n    if (!s.loginEmail.includes('@') || !s.loginEmail.trim()) e.loginEmail = true;\n    const pwOk = this.validPassword(s.loginPassword);\n    if (!pwOk) e.loginPassword = true;\n    if (Object.keys(e).length > 0) {\n      // Same destructive rejection at login: red borders, no text, wipe the password.\n      this.setState({ errors: e, loginPassword: '', cta: this.pickCta() });\n      return;\n    }\n    this.setState({ screen: 'success', errors: {} });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const NORM = '#dde6e2', ERR = '#E5484D', EM = '#0E9A78';\n\n    const authDef = [\n      { label: 'Create account', key: 'register', done: s.registeredOnce },\n      { label: 'Verify identity', key: 'verify', done: s.verifiedOnce },\n      { label: 'Sign in', key: 'login', done: s.screen === 'success' },\n    ];\n    const activeKey = s.screen === 'success' ? 'login' : s.screen === 'register' ? 'register' : s.screen === 'verify' ? 'verify' : 'login';\n    const authSteps = authDef.map((a, i) => {\n      const active = a.key === activeKey && s.screen !== 'success';\n      return {\n        label: a.label,\n        dotLabel: a.done ? '✓' : String(i + 1).padStart(2, '0'),\n        rowBg: active ? 'rgba(95,207,174,0.14)' : 'transparent',\n        dotBg: a.done ? EM : active ? '#5fcfae' : 'transparent',\n        dotColor: a.done ? '#fff' : active ? '#08231e' : '#3f7d6e',\n        dotBorder: a.done ? EM : active ? '#5fcfae' : '#2c5a4f',\n        labelColor: a.done || active ? '#eafaf4' : '#5b8e80',\n        labelWeight: active ? '700' : '500',\n      };\n    });\n\n    const lockedSteps = this.LOCKED.map((label, i) => ({ label, num: String(i + 1).padStart(2, '0') }));\n\n    const bd = {};\n    ['loginEmail', 'loginPassword', 'prefix', 'firstName', 'middleName', 'lastName', 'gender', 'dob', 'pharmacy', 'regEmail', 'regPassword', 'code']\n      .forEach(k => { bd[k] = s.errors[k] ? ERR : NORM; });\n\n    return {\n      authSteps, lockedSteps, bd,\n      isLogin: s.screen === 'login', isRegister: s.screen === 'register',\n      isVerify: s.screen === 'verify', isSuccess: s.screen === 'success',\n      loading: s.loading, cta: s.cta,\n      toasts: s.toasts,\n      loginEmail: s.loginEmail, loginPassword: s.loginPassword,\n      prefix: s.prefix, firstName: s.firstName, middleName: s.middleName, lastName: s.lastName,\n      gender: s.gender, dob: s.dob, pharmacy: s.pharmacy, regEmail: s.regEmail, regPassword: s.regPassword,\n      code: s.code,\n      on_loginEmail: this.onField('loginEmail'), on_loginPassword: this.onField('loginPassword'),\n      on_prefix: this.onField('prefix'), on_firstName: this.onField('firstName'),\n      on_middleName: this.onField('middleName'), on_lastName: this.onField('lastName'),\n      on_gender: this.onField('gender'), on_dob: this.onField('dob'),\n      on_pharmacy: this.onField('pharmacy'), on_regEmail: this.onField('regEmail'),\n      on_regPassword: this.onField('regPassword'), on_code: this.onField('code'),\n      toggleMode: () => this.toggleMode(),\n      submitRegister: () => this.submitRegister(),\n      submitVerify: () => this.submitVerify(),\n      submitLogin: () => this.submitLogin(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
